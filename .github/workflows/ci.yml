name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build packages
        run: npm run build:packages

      - name: Test packages
        run: npx vitest run

      - name: Build app
        run: npm run build

      - name: Check for changeset
        run: npx changeset status --since=origin/main
