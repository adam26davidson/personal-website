name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.head_commit.message != 'chore: version packages' }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build packages
        run: npm run build:packages

      - name: Version packages
        run: npx changeset version

      - name: Publish packages
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npx changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version bump
        run: |
          git config user.name "personal-site-ci[bot]"
          git config user.email "personal-site-ci[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages" || echo "No changes to commit"
          git push
