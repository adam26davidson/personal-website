name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build packages
        run: npm run build:packages

      - name: Version packages
        run: npx changeset version

      - name: Publish packages
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npx changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create version bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: version packages"
          title: "chore: version packages"
          body: "Automated version bump from changeset publish."
          branch: changeset-release/main
          delete-branch: true

      - name: Set validate status on version PR
        run: |
          SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/changeset-release/main --jq '.object.sha') || true
          if [ -n "$SHA" ] && echo "$SHA" | grep -qE '^[0-9a-f]{40}$'; then
            gh api -X POST repos/${{ github.repository }}/statuses/$SHA \
              -f state="success" \
              -f context="validate" \
              -f description="Validated by release workflow" \
              -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
